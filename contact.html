<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me | Jhen Perez</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Condensed:wght@800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <section class="contact-page-container">
    <div class="contact-content-grid">
      
      <div class="contact-info-side">
        <div class="contact-header">
          <h2 class="paragraph-contact-title">Let's Connect</h2>
          <p class="contact-subtitle">
            Have an exciting project in mind, looking for a dedicated Virtual Assistant, or just want to say hello? Drop me a message!
          </p>
        </div>

        <div class="contact-links-list">
          <!-- Email (Triggers email app) -->
          <a href="mailto:jhensalazarperez@gmail.com" class="contact-card-link">
            <div class="contact-card-content">
              <span class="contact-card-label">Email Me Directly</span>
              <span class="contact-card-value">jhensalazarperez@gmail.com</span>
            </div>
            <span class="arrow-icon">→</span>
          </a>

          <a href="https://www.linkedin.com/in/jhen-jhen-perez-0287103bb" target="_blank" rel="noopener noreferrer" class="contact-card-link">
            <div class="contact-card-content">
              <span class="contact-card-label">LinkedIn</span>
              <span class="contact-card-value">Jhen Jhen Perez</span>
            </div>
            <span class="arrow-icon">→</span>
          </a>

          <a href="https://www.facebook.com/lincoln.rios.73" target="_blank" rel="noopener noreferrer" class="contact-card-link">
            <div class="contact-card-content">
              <span class="contact-card-label">Facebook</span>
              <span class="contact-card-value">Jhen Perez</span>
            </div>
            <span class="arrow-icon">→</span>
          </a>

          <a href="https://github.com/YOUR_GITHUB_USERNAME_HERE" target="_blank" rel="noopener noreferrer" class="contact-card-link">
            <div class="contact-card-content">
              <span class="contact-card-label">GitHub</span>
              <span class="contact-card-value">github.com/your-username</span>
            </div>
            <span class="arrow-icon">→</span>
          </a>
        </div>
      </div>

      <div class="contact-form-side">
        <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
          
          <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">

          <div class="form-group">
            <label for="name" class="form-label">Your Name</label>
            <input type="text" id="name" name="name" required placeholder="John Doe" class="form-input">
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="john@example.com" class="form-input">
          </div>

          <div class="form-group">
            <label for="message" class="form-label">Your Message</label>
            <textarea id="message" name="message" rows="6" required placeholder="Hi Jhen, I would love to collaborate on..." class="form-textarea"></textarea>
          </div>

          <button type="submit" class="submit-button">Send Message</button>
        </form>
      </div>

    </div>
  </section>

</body>
</html>
